version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  rag-app:
    build: .
    container_name: rag-app
    ports:
      - "7860:7860"
    environment:
      - QDRANT_URL=http://qdrant:6333
      # Note: Users should provide their own API keys via an external .env file
      # or by passing them to `docker-compose run -e OPENAI_API_KEY=...`
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./markdown_docs:/app/markdown_docs
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
